# 项目相关配置
manager:
  # 名称
  name: manager
  # 系统设备脚本版本
  version: V22.0-20250929-3685ffa8
  # 版权年份
  copyrightYear: 2023
  # 文件路径 示例（ Windows配置D:/dameng/uploadPath，Linux配置 /home/dameng/uploadPath）
  profile: /opt/ncdb/uploadFile
  # 获取ip地址开关
  addressEnabled: false
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math

# 开发环境配置
server:
  # 服务器的HTTP端口，默认为8080
  port: 1081
  servlet:
    # 应用的访问路径
    context-path: /
  tomcat:
    # tomcat的URI编码
    uri-encoding: UTF-8
    # 连接数满后的排队数，默认为100
    accept-count: 1000
    threads:
      # tomcat最大线程数，默认为200
      max: 800
      # Tomcat启动初始化的线程数，默认值10
      min-spare: 100

# 日志配置
logging:
  level:
    com.dm.cn.base: debug
    com.dm.cn.system: debug
    org.springframework: warn

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# Spring配置
spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  profiles:
    active: druid
  # 文件上传
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 10GB
      # 设置总上传的文件大小
      max-request-size: 10GB
  # 服务模块
  devtools:
    restart:
      # 热部署开关
      enabled: true

  # mail
  mail:
    host: 10.166.20.201
    port: 25
    username: yth@jsdameng.com
    password: hust4400!
    default-encoding: utf-8
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: false
            required: false
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher

#  h2:
#    console:
#      enabled: true
#      path: /h2
#      settings:
#        web-allow-others: true

# token配置
token:
  # 令牌自定义标识
  header: Authorization
  # 令牌密钥
  secret: abcdefghijklmnopqrstuvwxyz
  # 令牌有效期（默认30分钟）
  expireTime: 300

# MyBatis配置
mybatis:
  # 搜索指定包别名
  typeAliasesPackage: com.dm.cn.**.domain
  # 配置mapper的扫描，找到所有的mapper.xml映射文件
  mapperLocations: classpath*:mapper/**/*Mapper.xml
# PageHelper分页插件
pagehelper:
  helperDialect: mysql
  supportMethodsArguments: false
  params: count=countSql

# Swagger配置
swagger:
  # 是否开启swagger
  enabled: true
  # 请求前缀
  pathMapping: /dev-api

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/ncdb/*,/ws/*

ncdb:
  # 安装解压目录
  destination: /opt
  # 默认远程脚本存放目录
  scriptPath: manager_config
  # 数据文件存放目录
  dataPath: ${ncdb.destination}/manager_data
  # 告警脚本文件
  alarmMessage: ${ncdb.scriptPath}/alarm_message.sh
  # 设备监控脚本文件
  deviceMonitor: ${ncdb.scriptPath}/device_monitor.sh
  # 获取服务可用端口脚本
  portRange: ${ncdb.scriptPath}/port_range.sh
  # 文件内容新增或修改脚本
  writeFile: ${ncdb.scriptPath}/write_file.sh
  # toml文件内容新增或修改脚本
  writeTomlFile: ${ncdb.scriptPath}/toml_write_file.sh
  # 命令行默认查询最大返回结果数量
  queryMaxLimit: 100
# 资源限制 单位M
serviceSize:
  # 一个实例节点服务需要的内存大小 单位GB
  memResource: 8
  # 一个实例节点服务需要的磁盘大小 单位GB
  diskResource: 20
  # 一个实例节点服务需要的内存大小 单位M
  resource: 256
  #系统预留的内存资源限制 单位M
  reserve: 256
  #系统预留的磁盘资源限制 单位M
  reserveDisk: 10240
# ssh 免密登录 私钥所在路径
ssh:
  idRsaPathLinux: /root/.ssh/id_rsa
  idRsaPathWin: C:\Users\DAMENG\.ssh\id_rsa
  # 最大资源数
  maxTotal: 10000
  # 在空闲连接回收器运行时检查的连接数，-1表示全部检查
  numTestsPerEvictionRun: -1
  # 每个key对应的最大资源数
  maxTotalPerKey: 500
  # 最大key数量
  maxIdlePerKey: 10000
  # 空闲最小key数量
  minIdlePerKey: 20
  # 没有可用资源时是否要等待
  isBlockWhenExhausted: true
  # 创建新资源对象后是否立即校验是否可用
  isTestOnCreate: false
  # 借用资源对象前是否校验是否可用
  isTestOnBorrow: false
  # 空闲最小剔除时间间隔（分钟）
  minEvictableIdleTime: 30
  # 两次过期操作时间间隔（秒）
  timeBetweenEvictionRuns: 30

architecture:
  x86Flags: x86
  armFlags: arm,aarch

# prometheus监控配置项
prometheus:
  # 安装路径
  path: /opt/prometheus
  # 组件解压超时时间 单位秒
  decompressTime: 30
  # 组件启动超时时间 单位秒
  startTime: 30
  # grafana docker容器化模式数据展示页面暴露地址
  grafanaExposeIp: 10.14.1.149
  # 对不同用户暴露监控组件端口
  userList:
    - userName: manager
      prometheusPort: 11112
      grafanaPort: 22223
      exporterPort: 33334

#CAS
cas:
  server:
    host:
      #CAS服务地址
      url: http://10.14.2.25:8888/cas
      #CAS服务登录地址
      login_url: ${cas.server.host.url}/login
      #CAS服务登出地址
      logout_url: ${cas.server.host.url}/logout?service=${app.server.host.url}
# 应用访问地址
app:
  #开启cas
  casEnable: false
  server:
    host:
      #后端接口地址
      url: http://10.14.142.29:${server.port}
  #应用登录地址
  login_url: /
  #应用登出地址
  logout_url: /logout
  #前端登录地址
  web_url: http://10.14.142.29/index
  # datasource 数据源加密配置
jasypt:
  encryptor:
    algorithm: PBEWithMD5AndDES
    iv-generator-classname: org.jasypt.iv.NoIvGenerator
